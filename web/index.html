<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵山胜境AI导游</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
            background: linear-gradient(145deg, #e8f4f8 0%, #b8d8e8 50%, #d4e9f2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .main-container {
            width: 100%;
            max-width: 1200px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 30px 80px rgba(100, 150, 200, 0.25), 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            flex-direction: row;
            height: 90vh;
            max-height: 750px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .chat-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            min-width: 0; 
            border-right: 1px solid rgba(180, 210, 230, 0.4);
            background: rgba(255,255,255,0.5);
        }
        .chat-header {
            background: linear-gradient(135deg, #4a90b0 0%, #5ba3c7 100%);
            color: white;
            padding: 15px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-header .title { 
            font-size: 18px; 
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .session-id-display {
            font-size: 12px;
            color: rgba(255,255,255,0.85);
            background: rgba(255,255,255,0.2);
            padding: 4px 14px;
            border-radius: 14px;
            cursor: pointer;
            max-width: 400px;
            overflow: hidden;
            text-overflow: clip;
            white-space: nowrap;
            font-family: 'Courier New', monospace;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .session-id-display:hover {
            background: rgba(255,255,255,0.3);
        }
        .clear-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            padding: 4px 14px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .clear-btn:hover { background: rgba(255,80,80,0.4); border-color: rgba(255,80,80,0.5); }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255,255,255,0.3);
        }
        .message { display: flex; gap: 12px; max-width: 85%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 2px 8px rgba(74, 144, 176, 0.3);
            border: 2px solid rgba(255,255,255,0.6);
        }
        /* 🔥 AI 助手头像 - 使用图片 */
        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #4a90b0, #5ba3c7);
        }
        .message.assistant .message-avatar .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 🔥 用户头像 - 保持 SVG */
        .message.user .message-avatar {
            background: linear-gradient(135deg, #6bb5d9, #4a90b0);
            color: white;
        }
        .message-content {
            background: white;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid rgba(200, 220, 235, 0.3);
        }
        .message.user .message-content { 
            background: linear-gradient(135deg, #5ba3c7, #4a90b0);
            color: white;
            border: none;
        }
        .message-time { font-size: 11px; color: #a0b8c8; margin-top: 5px; }
        .message.user .message-time { color: rgba(255,255,255,0.7); }

        .input-area {
            padding: 15px 24px;
            border-top: 1px solid rgba(180, 210, 230, 0.3);
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.6);
            align-items: center;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }
        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid rgba(180, 210, 230, 0.4);
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            min-width: 0;
            background: rgba(255,255,255,0.8);
            transition: all 0.3s;
        }
        .input-area input:focus { 
            border-color: #5ba3c7; 
            box-shadow: 0 0 0 3px rgba(91, 163, 199, 0.15);
        }
        .input-area input::placeholder {
            color: #a0b8c8;
        }
        .voice-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(180, 210, 230, 0.4);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            user-select: none;
        }
        .voice-btn:hover { 
            background: rgba(91, 163, 199, 0.1);
            border-color: #5ba3c7;
        }
        .voice-btn.recording { 
            background: #ff6b6b; 
            color: white; 
            transform: scale(1.1); 
            animation: pulse 0.5s infinite alternate;
            border-color: #ff6b6b;
        }
        @keyframes pulse {
            from { transform: scale(1.05); box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
            to { transform: scale(1.15); box-shadow: 0 0 20px 5px rgba(255,107,107,0.2); }
        }
        .voice-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .send-btn {
            background: linear-gradient(135deg, #5ba3c7, #4a90b0);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            flex-shrink: 0;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(74, 144, 176, 0.3);
        }
        .send-btn:hover { 
            background: linear-gradient(135deg, #6bb5d9, #5ba3c7);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(74, 144, 176, 0.35);
        }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .typing-dots span {
            animation: blink 1.4s infinite;
            display: inline-block;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .recording-tip {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 24px 48px;
            border-radius: 20px;
            font-size: 18px;
            z-index: 999;
            display: none;
            pointer-events: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .recording-tip.active { display: block; }
        .recording-tip .mic-icon {
            display: inline-block;
            animation: pulse 0.5s infinite alternate;
        }

        .digital-human-wrapper {
            width: 380px;
            background: linear-gradient(160deg, #dceef7 0%, #b8d8e8 50%, #c8e4f0 100%);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: relative;
        }
        .dh-header {
            background: rgba(255,255,255,0.15);
            color: #3a7a9a;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
            letter-spacing: 2px;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .dh-canvas-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .dh-canvas-wrapper canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .dh-status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(50, 100, 130, 0.7);
            font-size: 12px;
            background: rgba(255,255,255,0.6);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.4);
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; height: auto; max-height: none; border-radius: 20px; }
            .chat-container { border-right: none; border-bottom: 1px solid rgba(180, 210, 230, 0.3); height: 60vh; }
            .digital-human-wrapper { width: 100%; height: 50vh; min-height: 300px; }
            .session-id-display { max-width: 200px; font-size: 10px; }
        }
        @media (max-width: 480px) {
            .chat-header .title { font-size: 15px; }
            .digital-human-wrapper { height: 40vh; min-height: 250px; }
            .input-area input { font-size: 14px; padding: 10px 14px; }
            .send-btn { padding: 10px 18px; font-size: 14px; }
            .voice-btn { width: 38px; height: 38px; font-size: 18px; }
            .chat-messages { padding: 16px; }
            .input-area { padding: 12px 16px; }
            .session-id-display { max-width: 120px; font-size: 9px; }
            .message-avatar { width: 32px; height: 32px; font-size: 16px; }
        }
    </style>
    <script src="../digital-human-test/lib/pixi.min.js"></script>
    <script src="../digital-human-test/lib/live2dcubismcore.min.js"></script>
    <script src="../digital-human-test/lib/cubism4.min.js"></script>
</head>
<body>

    <div class="recording-tip" id="recordingTip">
        <span class="mic-icon">🎙️</span> 正在录音...
    </div>

    <div class="main-container">
        <div class="chat-container">
            <div class="chat-header">
                <span class="title">🏯 灵山胜境 AI导游</span>
                <div class="header-right">
                    <span class="session-id-display" id="sessionDisplay" title="点击复制">📋</span>
                    <button class="clear-btn" id="clearSessionBtn">🗑️ 清空</button>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="message-avatar">
                        <img src="/web/images/assistant-avatar.png" alt="小灵" class="avatar-img">
                    </div>
                    <div class="message-content">
                        您好！我是灵山胜境的AI导游小灵，有什么可以帮助您的吗？
                        <div class="message-time">刚刚</div>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <button class="voice-btn" id="voiceBtn" title="按住说话">🎤</button>
                <input type="text" id="messageInput" placeholder="输入问题或按住🎤说话..." autocomplete="off">
                <button class="send-btn" id="sendBtn">发送</button>
            </div>
        </div>

        <div class="digital-human-wrapper">
            <div class="dh-header">🎭 小灵 · AI导游</div>
            <div class="dh-canvas-wrapper" id="dhContainer">
                <canvas id="live2dCanvas"></canvas>
                <div class="dh-status" id="dhStatus">⏳ 加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. 会话管理
        // ============================================================
        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
        }
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = generateSessionId();
            localStorage.setItem('sessionId', sessionId);
        }
        document.getElementById('sessionDisplay').textContent = '📋 ' + sessionId;

        // ============================================================
        // 2. DOM 引用
        // ============================================================
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const recordingTip = document.getElementById('recordingTip');
        const dhStatus = document.getElementById('dhStatus');

        let isWaiting = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordTimer = null;

        // ============================================================
        // 3. 对话功能
        // ============================================================
        function addMessage(content, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            let avatarHTML = '';
            if (role === 'assistant') {
                // 🔥 AI 助手头像（使用你上传的图片）
                avatarHTML = `
                    <div class="message-avatar">
                        <img src="/web/images/assistant-avatar.png" alt="小灵" class="avatar-img">
                    </div>
                `;
            } else {
                // 🔥 用户头像（保持原来的 SVG）
                avatarHTML = `
                    <div class="message-avatar">
                        <svg viewBox="0 0 100 100" width="40" height="40">
                            <circle cx="50" cy="35" r="20" fill="#fff" opacity="0.8"/>
                            <circle cx="42" cy="32" rx="3" ry="4" fill="#6bb5d9"/>
                            <circle cx="58" cy="32" rx="3" ry="4" fill="#6bb5d9"/>
                            <circle cx="50" cy="42" r="6" fill="#e8a0a0" opacity="0.5"/>
                            <path d="M38 55 Q50 65 62 55" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
                        </svg>
                    </div>
                `;
            }

            const time = new Date().toLocaleTimeString();
            div.innerHTML = `
                ${avatarHTML}
                <div class="message-content">
                    ${escapeHtml(content)}
                    <div class="message-time">${time}</div>
                </div>
            `;
            chatMessages.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'end' });
            return div;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="message-avatar">
                    <img src="/web/images/assistant-avatar.png" alt="小灵" class="avatar-img">
                </div>
                <div class="message-content">
                    <span class="typing-dots"><span>●</span><span>●</span><span>●</span></span>
                </div>
            `;
            chatMessages.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // ============================================================
        // 4. 发送消息
        // ============================================================
        async function sendMessage(question) {
            if (!question) {
                question = messageInput.value.trim();
            }
            if (!question || isWaiting) return;

            messageInput.value = '';
            addMessage(question, 'user');
            isWaiting = true;
            sendBtn.disabled = true;
            voiceBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch(`/api/chat/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        use_rag: true,
                        n_results: 3,
                        session_id: sessionId
                    })
                });
                const data = await res.json();
                hideTyping();

                if (data.success) {
                    addMessage(data.answer, 'assistant');
                    if (window.digitalHuman && typeof window.digitalHuman.speak === 'function') {
                        await window.digitalHuman.speak(data.answer);
                    }
                } else {
                    addMessage('抱歉，服务暂时不可用。', 'assistant');
                }
            } catch (err) {
                hideTyping();
                console.error(err);
                addMessage('网络开小差了，请稍后再试。', 'assistant');
            } finally {
                isWaiting = false;
                sendBtn.disabled = false;
                voiceBtn.disabled = false;
                messageInput.focus();
            }
        }

        // ============================================================
        // 5. 语音输入
        // ============================================================
        async function startRecording() {
            if (isRecording || isWaiting) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                    stream.getTracks().forEach(t => t.stop());
                    recordingTip.classList.remove('active');
                    if (blob.size > 0) await recognizeAndSend(blob);
                };
                mediaRecorder.start();
                isRecording = true;
                voiceBtn.classList.add('recording');
                recordingTip.classList.add('active');
                recordTimer = setTimeout(() => {
                    if (isRecording) stopRecording();
                }, 10000);
            } catch (err) {
                console.error('录音失败:', err);
                alert('无法访问麦克风，请检查权限');
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                voiceBtn.classList.remove('recording');
                if (recordTimer) {
                    clearTimeout(recordTimer);
                    recordTimer = null;
                }
            }
        }

        async function recognizeAndSend(blob) {
            const formData = new FormData();
            formData.append('audio', blob, 'speech.mp3');
            try {
                const res = await fetch(`/api/voice/asr`, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success && data.text) {
                    await sendMessage(data.text);
                } else {
                    addMessage('语音识别失败，请重试', 'assistant');
                }
            } catch (err) {
                console.error('识别失败:', err);
                addMessage('语音识别服务异常', 'assistant');
            }
        }

        // ============================================================
        // 6. 🎯 数字人控制模块
        // ============================================================
        const DigitalHuman = {
            app: null,
            model: null,
            isReady: false,
            isSpeaking: false,
            _animationId: null,
            _audioContext: null,
            _currentAudio: null,
            _mouthSmooth: 0,
            _mouthParamIndex: -1,
            _formParamIndex: -1,
            _idleTimer: null,
            _isIdle: true,

            async init() {
                const container = document.getElementById('dhContainer');
                const canvas = document.getElementById('live2dCanvas');
                const width = container.clientWidth || 380;
                const height = container.clientHeight || 500;

                try {
                    this.app = new PIXI.Application({
                        view: canvas,
                        width: width,
                        height: height,
                        backgroundColor: 0xdceef7,
                        resolution: window.devicePixelRatio || 1,
                        autoDensity: true
                    });

                    const modelPath = '../models/hiyori_pro/runtime/hiyori_pro_t11.model3.json';
                    console.log('📂 加载模型:', modelPath);
                    this.model = await PIXI.live2d.Live2DModel.from(modelPath);
                    this.app.stage.addChild(this.model);

                    this.model.anchor.set(0.5, 0.5);
                    this.model.x = this.app.screen.width / 2;
                    this.model.y = this.app.screen.height / 2;
                    this.model.scale.set(0.14, 0.14);

                    await new Promise(resolve => setTimeout(resolve, 500));

                    this._disableAllMotions();
                    this._cacheParamIndices();
                    this._resetAllParameters();

                    this.isReady = true;
                    dhStatus.textContent = '✅ 已就绪';
                    console.log('✅ Hiyori Pro 加载成功');

                    this._startIdle();

                    window.addEventListener('resize', () => this.resize());

                } catch (err) {
                    console.error('数字人加载失败:', err);
                    dhStatus.textContent = '❌ 加载失败: ' + err.message;
                }
            },

            _disableAllMotions() {
                try {
                    if (!this.model || !this.model.internalModel) return;
                    const internal = this.model.internalModel;
                    
                    if (internal.motionManager) {
                        if (typeof internal.motionManager.stopAllMotions === 'function') {
                            internal.motionManager.stopAllMotions();
                        }
                        if (internal.motionManager.motionGroups) {
                            internal.motionManager.motionGroups = {};
                        }
                        if (internal.motionManager.state) {
                            internal.motionManager.state.playing = false;
                            internal.motionManager.state.currentTime = 0;
                            internal.motionManager.state.duration = 0;
                        }
                        internal.motionManager._currentMotion = null;
                        internal.motionManager._motions = [];
                        if (internal.motionManager._queuedMotions) {
                            internal.motionManager._queuedMotions = [];
                        }
                        if (internal.motionManager._onFinish) {
                            internal.motionManager._onFinish = null;
                        }
                        internal.motionManager.startRandomMotion = function() {
                            return Promise.resolve(null);
                        };
                        console.log('✅ motionManager 已彻底禁用');
                    }
                } catch(e) {
                    console.log('禁用动作失败:', e);
                }
            },

            _cacheParamIndices() {
                try {
                    if (!this.model || !this.model.internalModel) return;
                    const coreModel = this.model.internalModel.coreModel;
                    const paramIds = coreModel._parameterIds;
                    
                    for (let i = 0; i < paramIds.length; i++) {
                        const name = paramIds[i].getId ? paramIds[i].getId() : paramIds[i];
                        if (name === 'ParamMouthOpenY') {
                            this._mouthParamIndex = i;
                            console.log(`✅ 缓存 ParamMouthOpenY 索引: ${i}`);
                        }
                        if (name === 'ParamMouthForm') {
                            this._formParamIndex = i;
                            console.log(`✅ 缓存 ParamMouthForm 索引: ${i}`);
                        }
                    }
                } catch(e) {
                    console.warn('缓存参数索引失败:', e);
                }
            },

            _resetAllParameters() {
                try {
                    if (!this.model || !this.model.internalModel) return;
                    const coreModel = this.model.internalModel.coreModel;
                    
                    for (let i = 0; i < coreModel._parameterValues.length; i++) {
                        coreModel._parameterValues[i] = 0;
                    }
                    
                    coreModel.update();
                    console.log('✅ 所有参数已重置');
                } catch(e) {
                    console.log('重置参数失败:', e);
                }
            },

            _setMouth(value) {
                try {
                    if (!this.model || !this.model.internalModel) return;
                    const coreModel = this.model.internalModel.coreModel;
                    
                    if (this._mouthParamIndex !== -1) {
                        coreModel.setParameterValueByIndex(this._mouthParamIndex, value);
                        coreModel._parameterValues[this._mouthParamIndex] = value;
                    }
                    
                    if (this._formParamIndex !== -1) {
                        const formValue = value > 0.3 ? -0.5 + value * 0.3 : -0.3;
                        coreModel.setParameterValueByIndex(this._formParamIndex, formValue);
                        coreModel._parameterValues[this._formParamIndex] = formValue;
                    }
                    
                    coreModel.update();
                } catch(e) {}
            },

            _setEye(value) {
                try {
                    if (!this.model || !this.model.internalModel) return;
                    const coreModel = this.model.internalModel.coreModel;
                    const paramIds = coreModel._parameterIds;
                    for (let i = 0; i < paramIds.length; i++) {
                        const name = paramIds[i].getId ? paramIds[i].getId() : paramIds[i];
                        if (name === 'ParamEyeLOpen' || name === 'ParamEyeROpen') {
                            coreModel.setParameterValueByIndex(i, value);
                            coreModel._parameterValues[i] = value;
                        }
                    }
                    coreModel.update();
                } catch(e) {}
            },

            _setBrow(value) {
                try {
                    if (!this.model || !this.model.internalModel) return;
                    const coreModel = this.model.internalModel.coreModel;
                    const paramIds = coreModel._parameterIds;
                    for (let i = 0; i < paramIds.length; i++) {
                        const name = paramIds[i].getId ? paramIds[i].getId() : paramIds[i];
                        if (name === 'ParamBrowLY' || name === 'ParamBrowRY') {
                            coreModel.setParameterValueByIndex(i, value);
                            coreModel._parameterValues[i] = value;
                        }
                    }
                    coreModel.update();
                } catch(e) {}
            },

            _startIdle() {
                this._stopIdle();
                this._isIdle = true;
                
                const doIdleAction = () => {
                    if (!this._isIdle || this.isSpeaking || !this.isReady) {
                        this._idleTimer = setTimeout(doIdleAction, 3000);
                        return;
                    }
                    
                    const actions = [
                        () => {
                            this._setEye(1.0);
                            setTimeout(() => this._setEye(0), 150);
                        },
                        () => {
                            this._setMouth(0.3);
                            setTimeout(() => this._setMouth(0), 2000);
                        },
                        () => {
                            this._setBrow(0.5);
                            setTimeout(() => this._setBrow(0), 1000);
                        },
                        () => {
                            this._setMouth(0.2);
                            this._setEye(0.8);
                            setTimeout(() => {
                                this._setMouth(0);
                                this._setEye(0);
                            }, 1500);
                        }
                    ];
                    
                    const action = actions[Math.floor(Math.random() * actions.length)];
                    action();
                    
                    const delay = 3000 + Math.random() * 4000;
                    this._idleTimer = setTimeout(doIdleAction, delay);
                };
                
                setTimeout(doIdleAction, 2000);
                console.log('✅ 待机表情已启动');
            },

            _stopIdle() {
                this._isIdle = false;
                if (this._idleTimer) {
                    clearTimeout(this._idleTimer);
                    this._idleTimer = null;
                }
            },

            resize() {
                if (!this.app || !this.model) return;
                try {
                    const container = document.getElementById('dhContainer');
                    const width = container.clientWidth;
                    const height = container.clientHeight;
                    this.app.renderer.resize(width, height);
                    this.model.x = this.app.screen.width / 2;
                    this.model.y = this.app.screen.height / 2;
                    const scale = Math.min(width, height) / 1000;
                    this.model.scale.set(scale * 0.16, scale * 0.16);
                } catch(e) {}
            },

            async speak(text) {
                if (!this.isReady || !text || !this.model) return;
                
                if (this.isSpeaking) {
                    this._stopSpeaking();
                    await new Promise(r => setTimeout(r, 100));
                }

                this.isSpeaking = true;
                this._isIdle = false;
                this._stopIdle();
                
                dhStatus.textContent = '🔊 合成语音...';

                try {
                    const res = await fetch(`/api/voice/tts`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text, voice_type: 0 })
                    });
                    const data = await res.json();

                    if (!data.success || !data.audio_url) {
                        dhStatus.textContent = '❌ 合成失败';
                        this.isSpeaking = false;
                        this._startIdle();
                        return;
                    }

                    this._disableAllMotions();
                    this._setMouth(0);

                    const audio = new Audio(data.audio_url);
                    this._currentAudio = audio;

                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    this._audioContext = audioCtx;

                    const source = audioCtx.createMediaElementSource(audio);
                    const analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 256;
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);

                    this._mouthSmooth = 0;
                    let isActive = true;

                    const updateMouth = () => {
                        if (!isActive || !this.model || !this.model.internalModel || audio.paused || audio.ended) {
                            this._setMouth(0);
                            if (this._animationId) {
                                cancelAnimationFrame(this._animationId);
                                this._animationId = null;
                            }
                            return;
                        }

                        try {
                            analyser.getByteFrequencyData(dataArray);
                            let sum = 0;
                            for (let i = 0; i < dataArray.length; i++) {
                                sum += dataArray[i];
                            }
                            const avg = sum / dataArray.length;
                            let mouthOpen = Math.min(avg / 128, 1.5);
                            
                            if (mouthOpen < 0.05) mouthOpen = 0;
                            
                            this._mouthSmooth = this._mouthSmooth * 0.3 + mouthOpen * 0.7;
                            mouthOpen = this._mouthSmooth;

                            this._setMouth(mouthOpen);

                        } catch(e) {}

                        this._animationId = requestAnimationFrame(updateMouth);
                    };

                    audio.onplay = () => {
                        dhStatus.textContent = '🎤 说话中...';
                        isActive = true;
                        updateMouth();
                    };

                    audio.onended = () => {
                        isActive = false;
                        this._finishSpeaking();
                    };

                    audio.onerror = () => {
                        console.error('音频播放错误');
                        isActive = false;
                        this._finishSpeaking();
                    };

                    await audio.play();

                } catch (err) {
                    console.error('说话失败:', err);
                    dhStatus.textContent = '❌ 说话失败';
                    this._finishSpeaking();
                }
            },

            _stopSpeaking() {
                try {
                    if (this._currentAudio) {
                        this._currentAudio.pause();
                        this._currentAudio = null;
                    }
                    if (this._audioContext) {
                        this._audioContext.close();
                        this._audioContext = null;
                    }
                    if (this._animationId) {
                        cancelAnimationFrame(this._animationId);
                        this._animationId = null;
                    }
                    this._setMouth(0);
                } catch(e) {}
                this.isSpeaking = false;
            },

            _finishSpeaking() {
                this._setMouth(0);
                
                if (this._animationId) {
                    cancelAnimationFrame(this._animationId);
                    this._animationId = null;
                }
                
                if (this._audioContext) {
                    try { this._audioContext.close(); } catch(e) {}
                    this._audioContext = null;
                }
                
                this._currentAudio = null;
                this.isSpeaking = false;
                this._mouthSmooth = 0;
                dhStatus.textContent = '✅ 已就绪';
                
                this._disableAllMotions();
                this._startIdle();
            }
        };

        // ============================================================
        // 7. 清空会话
        // ============================================================
        document.getElementById('clearSessionBtn').addEventListener('click', async function() {
            if (confirm('确定要清空对话记忆吗？')) {
                try {
                    await fetch(`/api/chat/clear?session_id=${sessionId}`, { method: 'POST' });
                    sessionId = generateSessionId();
                    localStorage.setItem('sessionId', sessionId);
                    document.getElementById('sessionDisplay').textContent = '📋 ' + sessionId;
                    chatMessages.innerHTML = '';
                    addMessage('您好！我是灵山胜境的AI导游小灵，有什么可以帮助您的吗？', 'assistant');
                    addMessage('🔄 对话已清空，新会话ID: ' + sessionId, 'assistant');
                } catch (err) {
                    console.error('清空失败:', err);
                    alert('清空失败，请重试');
                }
            }
        });

        document.getElementById('sessionDisplay').addEventListener('click', function() {
            navigator.clipboard.writeText(sessionId).then(() => {
                alert('会话ID已复制: ' + sessionId);
            }).catch(() => {
                const input = document.createElement('input');
                input.value = sessionId;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert('会话ID已复制: ' + sessionId);
            });
        });

        // ============================================================
        // 8. 事件绑定
        // ============================================================
        sendBtn.onclick = () => {
            const text = messageInput.value.trim();
            if (text) sendMessage(text);
        };
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') {
                const text = messageInput.value.trim();
                if (text) sendMessage(text);
            }
        };
        voiceBtn.addEventListener('mousedown', startRecording);
        voiceBtn.addEventListener('mouseup', stopRecording);
        voiceBtn.addEventListener('mouseleave', stopRecording);
        voiceBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        voiceBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });
        voiceBtn.addEventListener('touchcancel', stopRecording);

        // ============================================================
        // 9. 启动
        // ============================================================
        window.digitalHuman = DigitalHuman;
        DigitalHuman.init();
        messageInput.focus();

        console.log('✅ 灵山胜境AI导游已加载');
        console.log('📡 API地址: /api/chat/ask');
        console.log(`📋 会话ID: ${sessionId}`);
        console.log('🎤 按住语音按钮说话');
        console.log('💡 多轮对话已启用');
        console.log('🎯 说话有嘴型，不说话有表情');
    </script>
