<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵山胜境AI导游</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a3c1a 0%, #2d4a1e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
        }
        .chat-header {
            background: #4a6741;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chat-header .title {
            font-size: 18px;
            font-weight: bold;
            white-space: nowrap;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .session-id-display {
            font-size: 11px;
            color: rgba(255,255,255,0.85);
            background: rgba(0,0,0,0.25);
            padding: 4px 10px;
            border-radius: 12px;
            cursor: pointer;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: 'Courier New', monospace;
        }
        .session-id-display:hover {
            background: rgba(0,0,0,0.4);
        }
        .clear-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            padding: 4px 14px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .clear-btn:hover {
            background: rgba(255,80,80,0.3);
            border-color: rgba(255,80,80,0.5);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #4a6741;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }
        .message.user .message-avatar { background: #6b8c5c; }
        .message-content {
            background: #f0f0f0;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: #4a6741;
            color: white;
        }
        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }
        .input-area {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            background: white;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            min-width: 0;
        }
        .input-area input:focus { border-color: #4a6741; }
        .voice-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #f0f0f0;
            border: 1px solid #ddd;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            user-select: none;
        }
        .voice-btn:hover { background: #e0e0e0; }
        .voice-btn.recording {
            background: #ff6b6b;
            color: white;
            transform: scale(1.1);
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1.05); }
            to { transform: scale(1.15); }
        }
        .voice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .send-btn {
            background: #4a6741;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            flex-shrink: 0;
        }
        .send-btn:hover { background: #5a7e51; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading-dots span {
            animation: blink 1.4s infinite;
            display: inline-block;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.4; }
            30% { opacity: 1; }
        }
        .speaking-indicator {
            display: none;
            font-size: 12px;
            color: #4a6741;
            margin-left: 10px;
            animation: pulse2 1s infinite;
        }
        .speaking-indicator.active {
            display: inline-block;
        }
        @keyframes pulse2 {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .assistant .message-content {
            display: flex;
            flex-direction: column;
        }
        .assistant .message-content .speaking-indicator {
            margin-left: 0;
            margin-top: 5px;
        }
        .recording-tip {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 16px;
            font-size: 18px;
            z-index: 999;
            display: none;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }
        .recording-tip.active {
            display: block;
        }
        @media (max-width: 600px) {
            .chat-header .title { font-size: 16px; }
            .session-id-display { max-width: 120px; font-size: 10px; }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>
    <!-- 录音提示浮层 -->
    <div class="recording-tip" id="recordingTip">🎙️ 正在录音...</div>

    <div class="chat-container">
        <div class="chat-header">
            <span class="title">🏯 灵山胜境 AI导游</span>
            <div class="header-right">
                <span class="session-id-display" id="sessionDisplay" title="点击复制完整ID">📋 加载中...</span>
                <button class="clear-btn" id="clearSessionBtn">🗑️ 清空记忆</button>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    您好！我是灵山胜境的AI导游小灵，有什么可以帮助您的吗？
                    <div class="message-time">刚刚</div>
                </div>
            </div>
        </div>
        <div class="input-area">
            <button class="voice-btn" id="voiceBtn" title="按住说话">🎤</button>
            <input type="text" id="messageInput" placeholder="输入问题或按住🎤说话..." autocomplete="off">
            <button class="send-btn" id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        // ========== 生成会话ID ==========
        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
        }

        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = generateSessionId();
            localStorage.setItem('sessionId', sessionId);
        }

        // ========== 显示完整 sessionId（带点击复制） ==========
        const sessionDisplay = document.getElementById('sessionDisplay');
        sessionDisplay.textContent = '📋 ' + sessionId;
        sessionDisplay.title = '点击复制完整ID';

        sessionDisplay.addEventListener('click', function() {
            navigator.clipboard.writeText(sessionId).then(() => {
                this.textContent = '✅ 已复制!';
                setTimeout(() => {
                    this.textContent = '📋 ' + sessionId;
                }, 1500);
            }).catch(() => {
                // 降级方案
                const input = document.createElement('input');
                input.value = sessionId;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                input.remove();
                this.textContent = '✅ 已复制!';
                setTimeout(() => {
                    this.textContent = '📋 ' + sessionId;
                }, 1500);
            });
        });

        console.log('📋 会话ID:', sessionId);

        // ========== 配置 ==========
        const API_BASE = 'https://lingshanai.cn';
        const MAX_RECORD_TIME = 10000;

        // ========== DOM 元素 ==========
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const recordingTip = document.getElementById('recordingTip');

        let isWaiting = false;
        let currentAudio = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordTimer = null;

        // ========== 消息渲染 ==========
        function addMessage(content, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const avatar = role === 'user' ? '👤' : '🤖';
            const time = new Date().toLocaleTimeString();

            let contentHtml = escapeHtml(content);
            if (role === 'assistant') {
                contentHtml += `<span class="speaking-indicator" id="speakingIndicator">🔊 播放中...</span>`;
            }

            div.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    ${contentHtml}
                    <div class="message-time">${time}</div>
                </div>
            `;
            chatMessages.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'end' });
            return div;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <span class="loading-dots"><span>●</span><span>●</span><span>●</span></span>
                </div>
            `;
            chatMessages.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function showSpeakingIndicator() {
            const el = document.getElementById('speakingIndicator');
            if (el) el.classList.add('active');
        }

        function hideSpeakingIndicator() {
            const el = document.getElementById('speakingIndicator');
            if (el) el.classList.remove('active');
        }

        // ========== 语音播报 ==========
        async function speakText(text) {
            if (!text) return;
            showSpeakingIndicator();

            try {
                const res = await fetch(`${API_BASE}/api/voice/tts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, voice_type: 0 })
                });
                const data = await res.json();

                if (data.success && data.audio_url) {
                    if (currentAudio) {
                        currentAudio.pause();
                        currentAudio = null;
                    }
                    const audio = new Audio(data.audio_url);
                    currentAudio = audio;
                    audio.onplay = () => showSpeakingIndicator();
                    audio.onended = () => {
                        hideSpeakingIndicator();
                        currentAudio = null;
                    };
                    audio.onerror = () => {
                        console.error('音频播放失败');
                        hideSpeakingIndicator();
                        currentAudio = null;
                    };
                    audio.play().catch(err => {
                        console.error('播放失败:', err);
                        hideSpeakingIndicator();
                    });
                } else {
                    hideSpeakingIndicator();
                }
            } catch (err) {
                console.error('语音播报请求失败:', err);
                hideSpeakingIndicator();
            }
        }

        // ========== 发送消息 ==========
        async function sendMessage(question) {
            if (!question) {
                question = messageInput.value.trim();
            }
            if (!question || isWaiting) return;

            messageInput.value = '';
            addMessage(question, 'user');
            isWaiting = true;
            sendBtn.disabled = true;
            voiceBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch(`${API_BASE}/api/chat/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        use_rag: true,
                        n_results: 3,
                        session_id: sessionId
                    })
                });
                const data = await res.json();
                hideTyping();

                if (data.success) {
                    addMessage(data.answer, 'assistant');
                    await speakText(data.answer);
                } else {
                    addMessage('抱歉，服务暂时不可用。', 'assistant');
                }
            } catch (err) {
                hideTyping();
                console.error(err);
                addMessage('网络开小差了，请稍后再试。', 'assistant');
            } finally {
                isWaiting = false;
                sendBtn.disabled = false;
                voiceBtn.disabled = false;
                messageInput.focus();
            }
        }

        // ========== 语音输入 ==========
        async function startRecording() {
            if (isRecording || isWaiting) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                    stream.getTracks().forEach(t => t.stop());
                    recordingTip.classList.remove('active');

                    if (blob.size > 0) {
                        await recognizeAndSend(blob);
                    }
                };

                mediaRecorder.start();
                isRecording = true;
                voiceBtn.classList.add('recording');
                recordingTip.classList.add('active');

                recordTimer = setTimeout(() => {
                    if (isRecording) stopRecording();
                }, MAX_RECORD_TIME);

            } catch (err) {
                console.error('录音失败:', err);
                alert('无法访问麦克风，请检查权限');
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                voiceBtn.classList.remove('recording');
                if (recordTimer) {
                    clearTimeout(recordTimer);
                    recordTimer = null;
                }
            }
        }

        async function recognizeAndSend(blob) {
            const formData = new FormData();
            formData.append('audio', blob, 'speech.mp3');

            try {
                const res = await fetch(`${API_BASE}/api/voice/asr`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.success && data.text) {
                    await sendMessage(data.text);
                } else {
                    addMessage('语音识别失败，请重试', 'assistant');
                }
            } catch (err) {
                console.error('识别失败:', err);
                addMessage('语音识别服务异常', 'assistant');
            }
        }

        // ========== 清空记忆 ==========
        document.getElementById('clearSessionBtn').addEventListener('click', async function() {
            if (confirm('确定要清空对话记忆吗？这将开始一个全新的对话。')) {
                const oldId = sessionId;
                console.log('🔄 清空前 sessionId:', oldId);

                try {
                    // 调用后端清空
                    await fetch(`${API_BASE}/api/chat/clear?session_id=${sessionId}`, {
                        method: 'POST'
                    });

                    // 生成新ID
                    sessionId = generateSessionId();
                    localStorage.setItem('sessionId', sessionId);

                    console.log('🔄 清空后 sessionId:', sessionId);
                    console.log('✅ ID已变化:', oldId !== sessionId);

                    // 更新显示
                    sessionDisplay.textContent = '📋 ' + sessionId;
                    sessionDisplay.title = '点击复制完整ID';

                    // 清空聊天记录
                    chatMessages.innerHTML = '';
                    addMessage('您好！我是灵山胜境的AI导游小灵，有什么可以帮助您的吗？', 'assistant');
                    addMessage('🔄 对话记忆已清空，新会话ID: ' + sessionId, 'assistant');

                } catch (err) {
                    console.error('清空会话失败:', err);
                    alert('清空失败，请重试');
                }
            }
        });

        // ========== 事件绑定 ==========
        sendBtn.onclick = () => {
            const text = messageInput.value.trim();
            if (text) sendMessage(text);
        };

        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') {
                const text = messageInput.value.trim();
                if (text) sendMessage(text);
            }
        };

        voiceBtn.addEventListener('mousedown', startRecording);
        voiceBtn.addEventListener('mouseup', stopRecording);
        voiceBtn.addEventListener('mouseleave', stopRecording);
        voiceBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        voiceBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });
        voiceBtn.addEventListener('touchcancel', stopRecording);

        messageInput.focus();

        console.log('✅ 灵山胜境AI导游已加载');
        console.log(`📡 API地址: ${API_BASE}/api/chat/ask`);
        console.log(`📋 会话ID: ${sessionId}`);
        console.log('🎤 按住语音按钮说话');
        console.log('💡 多轮对话已启用，AI会记住上下文');
        console.log('📋 点击会话ID可以复制');
    </script>
</body>
</html>
