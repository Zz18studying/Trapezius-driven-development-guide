        // ============================================================
        // 获取 URL 参数
        // ============================================================
        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // ============================================================
        // 语音讲解（调用后端 TTS）
        // ============================================================
        let currentAudio = null;

        function playVoice(text, btnElement) {
            // 如果已经有音频在播放，先停止
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
                document.querySelectorAll('.btn-gold').forEach(b => b.classList.remove('playing'));
            }

            // 按钮添加播放状态
            if (btnElement) {
                btnElement.classList.add('playing');
                btnElement.textContent = '加载中...';
            }

            fetch('/api/voice/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, voice_type: 0 })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.audio_url) {
                        const audio = new Audio(data.audio_url);
                        currentAudio = audio;
                        if (btnElement) {
                            btnElement.textContent = '播放中...';
                        }
                        audio.play();
                        audio.onended = function() {
                            if (btnElement) {
                                btnElement.classList.remove('playing');
                                btnElement.textContent = '语音讲解';
                            }
                            currentAudio = null;
                        };
                        audio.onerror = function() {
                            if (btnElement) {
                                btnElement.classList.remove('playing');
                                btnElement.textContent = '语音讲解';
                            }
                            currentAudio = null;
                            alert('语音播放失败，请稍后重试');
                        };
                    } else {
                        if (btnElement) {
                            btnElement.classList.remove('playing');
                            btnElement.textContent = '语音讲解';
                        }
                        alert('语音合成失败，请稍后重试');
                    }
                })
                .catch(err => {
                    console.error('语音合成失败:', err);
                    if (btnElement) {
                        btnElement.classList.remove('playing');
                        btnElement.textContent = '语音讲解';
                    }
                    alert('语音服务异常，请稍后重试');
                });
        }

        // ============================================================
        // 渲染详情
        // ============================================================
        function renderDetail() {
            const id = parseInt(getUrlParam('id'));
            const spot = spotsData.find(s => s.id === id);

            if (!spot) {
                document.getElementById('detailContainer').innerHTML = `
                        <div style="text-align:center;padding:60px 20px;color:#6a8a9a;">
                            <div style="font-size:18px;font-weight:700;margin-bottom:16px;">未找到景点</div>
                            <h2>景点未找到</h2>
                            <p style="margin-top:8px;">请返回景点列表重新选择</p>
                            <a href="spots.html" style="display:inline-block;margin-top:16px;padding:10px 32px;border-radius:50px;background:#2c6e8a;color:white;text-decoration:none;">返回列表</a>
                        </div>
                    `;
                return;
            }

            // 将 detail 中的 \n 转换为 <br>
            const detailHtml = spot.detail.replace(/\n/g, '<br>');

            document.getElementById('detailContainer').innerHTML = `
                    <div class="detail-img" style="background-image: url('${spot.image}');">
                        <div class="overlay">
                            <h1>${spot.icon} ${spot.name}</h1>
                            <div class="sub-info">
                                <span>评分 ${spot.rating}</span>
                                <span>位置 ${spot.location}</span>
                                <span>建议 ${spot.time}</span>
                                <span>热度 ${spot.visitors}</span>
                            </div>
                        </div>
                    </div>
                    <div class="detail-body">
                        <div class="detail-section">
                            <h2>景点介绍</h2>
                            <p>${detailHtml}</p>
                        </div>

                        <div class="detail-section">
                            <h2>基本信息</h2>
                            <div class="info-grid">
                                <div class="info-item">
                                    <div class="label">位置</div>
                                    <div class="value">${spot.location}</div>
                                </div>
                                <div class="info-item">
                                    <div class="label">建议游览</div>
                                    <div class="value">${spot.time}</div>
                                </div>
                                <div class="info-item">
                                    <div class="label">评分</div>
                                    <div class="value">${spot.rating} / 5.0</div>
                                </div>
                                <div class="info-item">
                                    <div class="label">日均游客</div>
                                    <div class="value">${spot.visitors}</div>
                                </div>
                            </div>
                        </div>

                        <div class="detail-section">
                            <h2>标签</h2>
                            <div class="detail-tags-wrap">
                                ${spot.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        </div>

                        <div class="detail-actions">
                            <button class="btn btn-primary" onclick="location.href='chat.html'">问小灵</button>
                            <button class="btn btn-gold" onclick="playVoice('${spot.detail.replace(/'/g, "\\'")}', this)">语音讲解</button>
                            <button class="btn btn-outline" onclick="history.back()">返回列表</button>
                        </div>
                    </div>
                `;

            document.title = `${spot.name} · 灵山胜境`;
        }

        renderDetail();
        console.log('景点详情页加载成功');
    </script>

</body>
</html>
