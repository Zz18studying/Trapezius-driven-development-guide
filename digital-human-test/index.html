<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Shizuku 数字人测试</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            font-family: sans-serif;
        }
        canvas {
            width: 600px;
            height: 800px;
            border-radius: 16px;
            background: #2d4a1e;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            background: #4a6741;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .controls button:hover {
            background: #5a7e51;
            transform: scale(1.03);
        }
        .controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .status {
            color: #aaa;
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <canvas id="live2dCanvas"></canvas>

    <div class="controls">
        <button id="btnSpeak">🗣️ 说话</button>
        <button id="btnIdle">😐 待机</button>
        <button id="btnHappy">😊 开心</button>
        <button id="btnSad">😢 悲伤</button>
        <button id="btnReset">🔄 重置</button>
    </div>
    <div class="status" id="status">⏳ 加载中...</div>

    <!-- 使用本地库（不依赖外网） -->
    <script src="/digital-human-test/lib/pixi.min.js"></script>
    <script src="/digital-human-test/lib/live2dcubismcore.min.js"></script>
    <script src="/digital-human-test/lib/cubism4.min.js"></script>

    <script>
        // 模型路径
        const MODEL_PATH = '/models/shizuku/runtime/shizuku.model3.json';
        const API_BASE = 'https://lingshanai.cn/api';

        const canvas = document.getElementById('live2dCanvas');
        const statusEl = document.getElementById('status');
        const btnSpeak = document.getElementById('btnSpeak');
        const btnIdle = document.getElementById('btnIdle');
        const btnHappy = document.getElementById('btnHappy');
        const btnSad = document.getElementById('btnSad');
        const btnReset = document.getElementById('btnReset');

        let app = null;
        let model = null;
        let currentAudio = null;

        function initPixi() {
            try {
                app = new PIXI.Application({
                    view: canvas,
                    width: 600,
                    height: 800,
                    backgroundColor: 0x2d4a1e,
                    resolution: window.devicePixelRatio || 1,
                    autoDensity: true
                });
                statusEl.textContent = '⏳ 加载模型中...';
                console.log('✅ PixiJS 初始化成功');
            } catch (err) {
                console.error('PixiJS 初始化失败:', err);
                statusEl.textContent = '❌ PixiJS 初始化失败';
            }
        }

        async function loadModel() {
            try {
                model = await PIXI.live2d.Live2DModel.from(MODEL_PATH);
                app.stage.addChild(model);

                model.anchor.set(0.5, 0.5);
                model.x = app.screen.width / 2;
                model.y = app.screen.height / 2;
                model.scale.set(0.40, 0.40);

                try { model.motion('Idle'); } catch(e) {}

                statusEl.textContent = '✅ 数字人已就绪，点击"说话"测试口型';
                btnSpeak.disabled = false;

            } catch (err) {
                console.error('加载失败:', err);
                statusEl.textContent = '❌ 加载失败: ' + err.message;
            }
        }

        async function speak(text) {
            if (!model) return;

            statusEl.textContent = '🔊 正在合成语音...';
            btnSpeak.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/voice/tts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, voice_type: 0 })
                });
                const data = await res.json();

                if (!data.success || !data.audio_url) {
                    statusEl.textContent = '❌ 语音合成失败';
                    btnSpeak.disabled = false;
                    return;
                }

                model.speak(data.audio_url, {
                    onStart: () => { statusEl.textContent = '🎤 说话中...'; },
                    onEnd: () => {
                        statusEl.textContent = '✅ 播放完成';
                        btnSpeak.disabled = false;
                        try { model.motion('Idle'); } catch(e) {}
                    },
                    onError: (err) => {
                        console.error('口型同步错误:', err);
                        statusEl.textContent = '⚠️ 口型同步异常';
                        btnSpeak.disabled = false;
                    }
                });

            } catch (err) {
                console.error('说话失败:', err);
                statusEl.textContent = '❌ 说话失败';
                btnSpeak.disabled = false;
            }
        }

        function playMotion(name) {
            if (!model) return;
            try {
                model.motion(name);
                statusEl.textContent = `🎬 动作: ${name}`;
            } catch(e) {
                statusEl.textContent = `⚠️ 动作 "${name}" 不存在`;
            }
        }

        function speakTest() {
            const texts = [
                '你好，我是灵山胜境的AI导游小灵',
                '灵山大佛通高88米，是华东地区最高的青铜佛像',
                '九龙灌浴表演平日10点、11点半、13点半、15点开始'
            ];
            speak(texts[Math.floor(Math.random() * texts.length)]);
        }

        btnSpeak.addEventListener('click', speakTest);
        btnIdle.addEventListener('click', () => playMotion('Idle'));
        btnHappy.addEventListener('click', () => playMotion('Happy'));
        btnSad.addEventListener('click', () => playMotion('Sad'));
        btnReset.addEventListener('click', () => { try { model.motion('Idle'); } catch(e) {}; statusEl.textContent = '🔄 已重置'; });

        // 启动
        initPixi();
        loadModel();

        console.log('📋 数字人测试页面已加载');
        console.log('💡 点击"说话"测试口型同步');
    </script>
</body>
</html>
